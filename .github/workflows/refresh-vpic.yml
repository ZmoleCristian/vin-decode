name: refresh-vpic

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      force_publish:
        description: "publish even if data unchanged"
        required: false
        default: "false"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  refresh:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: VinDecodeP@ss123
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P VinDecodeP@ss123 -C -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zstd jq
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: probe + download latest vPIC dump
        id: probe
        run: |
          set -eo pipefail
          for i in 0 1 2; do
            ym=$(date -u -d "$(date -u +%Y-%m-15) -${i} month" +%Y_%m)
            url="https://vpic.nhtsa.dot.gov/downloads/vPICList_lite_${ym}.bak.zip"
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url")
            if [ "$code" = "200" ]; then
              echo "ym=$ym" >> $GITHUB_OUTPUT
              echo "url=$url" >> $GITHUB_OUTPUT
              echo "found vPIC ${ym}"
              break
            fi
          done
          if [ -z "${ym:-}" ]; then
            echo "no recent vPIC dump found"; exit 1
          fi
          curl -fsSL --retry 3 --max-time 600 -o /tmp/vpic.bak.zip "$url"
          unzip -o /tmp/vpic.bak.zip -d /tmp
          extracted=$(find /tmp -maxdepth 1 -iname '*.bak' | head -1)
          if [ -z "$extracted" ]; then echo "no .bak in archive"; exit 1; fi
          mv "$extracted" /tmp/vpic.bak

      - name: skip if unchanged
        id: skip
        run: |
          set -e
          current=$(cat data/VERSION 2>/dev/null || echo none)
          incoming="${{ steps.probe.outputs.ym }}"
          force="${{ github.event.inputs.force_publish }}"
          if [ "$current" = "$incoming" ] && [ "$force" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: restore .bak in mssql + dump csv
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -e
          container=$(docker ps --filter ancestor=mcr.microsoft.com/mssql/server:2022-latest --format '{{.ID}}' | head -1)
          if [ -z "$container" ]; then echo "no mssql container running"; docker ps; exit 1; fi
          docker exec -u root "$container" mkdir -p /var/opt/mssql/backup
          docker cp /tmp/vpic.bak "$container":/var/opt/mssql/backup/vpic.bak
          docker exec -u root "$container" chown -R mssql:mssql /var/opt/mssql/backup
          mkdir -p /tmp/csv

          # Discover logical names from .bak header — they vary by snapshot
          sqlcmd -S localhost,1433 -U sa -P 'VinDecodeP@ss123' -C -h -1 -W -s "$(printf '\t')" \
            -Q "RESTORE FILELISTONLY FROM DISK = N'/var/opt/mssql/backup/vpic.bak'" \
            -o /tmp/filelist.txt
          data_logical=$(awk -F'\t' 'NR==1 {print $1}' /tmp/filelist.txt | xargs)
          log_logical=$(awk -F'\t' 'NR==2 {print $1}' /tmp/filelist.txt | xargs)
          echo "data logical: $data_logical"
          echo "log logical:  $log_logical"

          cat > /tmp/restore.sql <<SQL
          USE [master];
          RESTORE DATABASE [vPICList] FROM DISK = N'/var/opt/mssql/backup/vpic.bak'
          WITH MOVE N'${data_logical}' TO N'/var/opt/mssql/data/vPICList.mdf',
               MOVE N'${log_logical}' TO N'/var/opt/mssql/data/vPICList_log.ldf',
               REPLACE, NOUNLOAD, STATS = 5;
          SQL
          sqlcmd -S localhost,1433 -U sa -P 'VinDecodeP@ss123' -C -i /tmp/restore.sql

          dump_table () {
            local query="$1"
            local out="$2"
            local header="$3"
            sqlcmd -S localhost,1433 -U sa -P 'VinDecodeP@ss123' -C -d vPICList -W -s "$(printf '\t')" -h -1 \
              -Q "$query" -o "${out}.raw"
            grep -vE '^\s*$|^\([0-9]+ rows affected\)$|^Changed database context' "${out}.raw" \
              | LC_ALL=C sort -t "$(printf '\t')" -k1,1 -s > "${out}"
            sed -i "1i ${header}" "${out}"
            rm "${out}.raw"
          }

          TAB=$(printf '\t')
          dump_table \
            "SELECT w.Wmi, REPLACE(REPLACE(m.Name, CHAR(13), ' '), CHAR(10), ' ') FROM Wmi w JOIN Wmi_Make wm ON wm.WmiId=w.Id JOIN Make m ON m.Id=wm.MakeId ORDER BY w.Wmi" \
            /tmp/csv/wmi_make.csv \
            "Wmi${TAB}Make"

          dump_table \
            "SELECT w.Wmi, ws.VinSchemaId FROM Wmi w JOIN Wmi_VinSchema ws ON ws.WmiId=w.Id ORDER BY w.Wmi" \
            /tmp/csv/wmi_schema_id.csv \
            "Wmi${TAB}schema_id"

          # Discover Pattern columns first — vPIC uses ElementWeight in some snapshots, just Weight in others
          sqlcmd -S localhost,1433 -U sa -P 'VinDecodeP@ss123' -C -d vPICList -W -h -1 \
            -Q "SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_NAME='Pattern' ORDER BY ORDINAL_POSITION" \
            -o /tmp/pattern_cols.txt
          echo "--- pattern columns ---"
          cat /tmp/pattern_cols.txt
          weight_col=$(grep -iE 'weight' /tmp/pattern_cols.txt | head -1 | xargs)
          weight_col=${weight_col:-NULL}
          weight_expr=$([ "$weight_col" = "NULL" ] && echo "0" || echo "ISNULL(p.${weight_col},0)")
          echo "using weight expr: $weight_expr"

          dump_table \
            "SELECT p.VinSchemaId, REPLACE(REPLACE(p.Keys, CHAR(13), ' '), CHAR(10), ' '), e.Name, REPLACE(REPLACE(p.AttributeId, CHAR(13), ' '), CHAR(10), ' '), ${weight_expr} FROM Pattern p JOIN Element e ON e.Id=p.ElementId ORDER BY p.VinSchemaId" \
            /tmp/csv/schema_id_lookup.csv \
            "schema_id${TAB}Pattern${TAB}ElementCode${TAB}AttributeId${TAB}ElementWeight"

          echo "--- csv head ---"
          for f in /tmp/csv/*.csv; do echo "=== $f ==="; head -5 "$f"; done
          echo "--- csv line counts ---"
          wc -l /tmp/csv/*.csv
          echo "--- schema_id_lookup lines 35-45 ---"
          sed -n '35,45p' /tmp/csv/schema_id_lookup.csv | cat -A

      - name: regenerate FSTs
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -e
          mkdir -p target/maps
          cargo run --features build --bin vin-decode-build -- /tmp/csv target/maps
          mkdir -p data
          cp target/maps/*.fst data/
          for bin in target/maps/*.bin; do
            zstd -19 -f -o "data/$(basename $bin).zst" "$bin"
          done
          echo "${{ steps.probe.outputs.ym }}" > data/VERSION

      - name: bump patch version
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -e
          current=$(grep '^version' Cargo.toml | head -1 | sed -E 's/version = "([0-9.]+)"/\1/')
          IFS='.' read -r maj min patch <<< "$current"
          new="${maj}.${min}.$((patch+1))"
          sed -i "0,/^version = \".*\"/ s//version = \"${new}\"/" Cargo.toml
          echo "bumped ${current} -> ${new}"

      - name: cargo build + test
        if: steps.skip.outputs.skip != 'true'
        run: |
          cargo build --all-features
          cargo test --all-features

      - name: commit + tag
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -e
          new=$(grep '^version' Cargo.toml | head -1 | sed -E 's/version = "([0-9.]+)"/\1/')
          git config user.name "vpic-bot"
          git config user.email "vpic-bot@users.noreply.github.com"
          git add data/ Cargo.toml Cargo.lock
          git commit -m "chore(data): refresh vPIC ${{ steps.probe.outputs.ym }} (v${new})"
          git tag "v${new}"
          git push origin HEAD --tags

      - name: cargo publish
        if: steps.skip.outputs.skip != 'true' && env.CARGO_REGISTRY_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features
